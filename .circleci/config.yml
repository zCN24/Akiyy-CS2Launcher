version: 2.1

jobs:
  build-and-release:
    machine:
      image: windows-server-2022-gui:current
    resource_class: windows.medium
    steps:
      - checkout
      - run:
          name: Setup Toolchain
          shell: powershell.exe -ExecutionPolicy Bypass
          command: |
            $ErrorActionPreference = "Stop"

            if (-not (Get-Command dotnet -ErrorAction SilentlyContinue)) {
              Invoke-WebRequest -Uri "https://dot.net/v1/dotnet-install.ps1" -OutFile "dotnet-install.ps1"
              .\dotnet-install.ps1 -Channel "8.0"
              $dotnetPath = "$env:USERPROFILE\.dotnet"
              $env:PATH = "$dotnetPath;$env:PATH"
              [Environment]::SetEnvironmentVariable("PATH", "$dotnetPath;" + [Environment]::GetEnvironmentVariable("PATH", "User"), "User")
            }

            if (-not (Get-Command python -ErrorAction SilentlyContinue)) {
              choco install -y python --version=3.12.7
              $pythonDir = "C:\Python312"
              $pythonScripts = "C:\Python312\Scripts"
              $env:PATH = "$pythonDir;$pythonScripts;$env:PATH"
            }

            dotnet --info
            python --version

      - run:
          name: Build Package Manifest And Upload
          shell: powershell.exe -ExecutionPolicy Bypass
          command: |
            $ErrorActionPreference = "Stop"

            $required = @("COS_SECRET_ID", "COS_SECRET_KEY", "COS_BUCKET", "COS_REGION")
            $missing = @()
            foreach ($name in $required) {
              if ([string]::IsNullOrWhiteSpace((Get-Item "Env:$name" -ErrorAction SilentlyContinue).Value)) {
                $missing += $name
              }
            }

            if ($missing.Count -gt 0) {
              throw "Missing required environment variables: $($missing -join ', ')"
            }

            $updateChannel = if ([string]::IsNullOrWhiteSpace($env:UPDATE_CHANNEL)) { "stable" } else { $env:UPDATE_CHANNEL }
            $cosReleasePrefix = if ([string]::IsNullOrWhiteSpace($env:COS_RELEASE_PREFIX)) { "cs2launcher/releases" } else { $env:COS_RELEASE_PREFIX }
            $cosManifestKey = if ([string]::IsNullOrWhiteSpace($env:COS_MANIFEST_KEY)) { "cs2launcher/latest.json" } else { $env:COS_MANIFEST_KEY }

            $version = "1.0.$env:CIRCLE_BUILD_NUM"
            $tag = "v$version"
            $zipName = "CS2Launcher-$version.zip"

            dotnet restore CS2Launcher.csproj
            dotnet build CS2Launcher.csproj -c Release /p:Version=$version /p:AssemblyVersion=$version /p:FileVersion=$version

            $sourceDir = "bin/Release/net8.0-windows"
            $srcDir = "src"
            $stageDir = "dist/stage"

            if (Test-Path "dist") {
              Remove-Item "dist" -Recurse -Force
            }

            New-Item -ItemType Directory -Path $stageDir -Force | Out-Null
            Copy-Item "$sourceDir/*" -Destination $stageDir -Recurse -Force

            if (Test-Path $srcDir) {
              Copy-Item "$srcDir/*" -Destination $stageDir -Recurse -Force
            }

            Compress-Archive -Path "$stageDir/*" -DestinationPath "dist/$zipName" -Force

            $sha256 = (Get-FileHash -Algorithm SHA256 "dist/$zipName").Hash.ToLowerInvariant()

            function Resolve-GitHubRepo([string]$value) {
              if ([string]::IsNullOrWhiteSpace($value)) {
                return $null
              }

              $v = $value.Trim()

              if ($v -match '^[^/\s]+/[^/\s]+$') {
                return $v
              }

              if ($v -match '^https?://(?:www\.)?github\.com/([^/\s]+)/([^/\s]+?)(?:\.git)?/?$') {
                return "$($Matches[1])/$($Matches[2])"
              }

              if ($v -match '^git@github\.com:([^/\s]+)/([^/\s]+?)(?:\.git)?$') {
                return "$($Matches[1])/$($Matches[2])"
              }

              return $null
            }

            $githubRepo = Resolve-GitHubRepo $env:GITHUB_REPOSITORY
            if ($null -eq $githubRepo) {
              $githubRepo = Resolve-GitHubRepo "$env:CIRCLE_PROJECT_USERNAME/$env:CIRCLE_PROJECT_REPONAME"
            }

            $hasValidGithubRepo = -not [string]::IsNullOrWhiteSpace($githubRepo)
            if (-not $hasValidGithubRepo) {
              throw "Invalid GitHub repository value. Use owner/repo or a valid GitHub URL such as https://github.com/owner/repo"
            }
            $githubPackageUrl = "https://github.com/$githubRepo/releases/download/$tag/$zipName"

            $cosBaseUrl = if ([string]::IsNullOrWhiteSpace($env:COS_BASE_URL)) {
              "https://$($env:COS_BUCKET).cos.$($env:COS_REGION).myqcloud.com"
            } else {
              $env:COS_BASE_URL.TrimEnd('/')
            }

            $cosReleasePrefix = $cosReleasePrefix.Trim('/')
            $cosManifestKey = $cosManifestKey.Trim('/')
            $cosObjectKey = "$cosReleasePrefix/$tag/$zipName"
            $cosPackageUrl = "$cosBaseUrl/$cosObjectKey"

            $mandatory = $false
            $releaseNotes = "Auto release from $env:CIRCLE_SHA1"

            if (-not [string]::IsNullOrWhiteSpace($env:SOURCE_MANIFEST_URL)) {
              try {
                $existing = Invoke-RestMethod -Uri $env:SOURCE_MANIFEST_URL -Method Get -TimeoutSec 20
                if ($null -ne $existing.channels) {
                  $existingChannel = $existing.channels.$updateChannel
                  if ($null -ne $existingChannel) {
                    if ($null -ne $existingChannel.mandatory) {
                      $mandatory = [bool]$existingChannel.mandatory
                    }

                    if (-not [string]::IsNullOrWhiteSpace($existingChannel.releaseNotes)) {
                      $releaseNotes = [string]$existingChannel.releaseNotes
                    }
                  }
                } else {
                  if ($null -ne $existing.mandatory) {
                    $mandatory = [bool]$existing.mandatory
                  }

                  if (-not [string]::IsNullOrWhiteSpace($existing.releaseNotes)) {
                    $releaseNotes = [string]$existing.releaseNotes
                  }
                }
              } catch {
                Write-Host "Cannot read SOURCE_MANIFEST_URL, fallback to defaults."
              }
            }

            if (-not [string]::IsNullOrWhiteSpace($env:RELEASE_NOTES)) {
              $releaseNotes = $env:RELEASE_NOTES
            }

            $manifestForGithub = [ordered]@{
              version = $version
              packageUrl = $githubPackageUrl
              sha256 = $sha256
              releaseNotes = $releaseNotes
              mandatory = $mandatory
              channel = $updateChannel
            }

            $manifestForCos = [ordered]@{
              version = $version
              packageUrl = $cosPackageUrl
              sha256 = $sha256
              releaseNotes = $releaseNotes
              mandatory = $mandatory
              channel = $updateChannel
            }

            $manifestForGithub | ConvertTo-Json -Depth 6 | Out-File -FilePath "dist/manifest.json" -Encoding utf8
            $manifestForCos | ConvertTo-Json -Depth 6 | Out-File -FilePath "dist/manifest-cos.json" -Encoding utf8

            if ([string]::IsNullOrWhiteSpace($env:GITHUB_TOKEN)) {
              throw "GITHUB_TOKEN is required. Release upload cannot be skipped."
            }

            if (-not (Get-Command gh -ErrorAction SilentlyContinue)) {
              choco install -y gh

              # Chocolatey may not update PATH for the current PowerShell session.
              $machinePath = [Environment]::GetEnvironmentVariable("PATH", "Machine")
              $userPath = [Environment]::GetEnvironmentVariable("PATH", "User")
              $env:PATH = "$machinePath;$userPath"

              $ghCandidates = @(
                "C:\Program Files\GitHub CLI",
                "C:\ProgramData\chocolatey\bin"
              )
              foreach ($dir in $ghCandidates) {
                if ((Test-Path $dir) -and ($env:PATH -notlike "*$dir*")) {
                  $env:PATH = "$dir;$env:PATH"
                }
              }
            }

            $ghCmd = Get-Command gh -ErrorAction SilentlyContinue
            if ($null -eq $ghCmd) {
              throw "gh is still unavailable after installation. Check Chocolatey install logs and PATH."
            }

            $tokenPath = Join-Path $env:TEMP "gh_token.txt"
            $env:GITHUB_TOKEN | Out-File -FilePath $tokenPath -Encoding ascii -NoNewline
            Get-Content $tokenPath | & $ghCmd.Source auth login --with-token

            $releaseName = "$env:CIRCLE_PROJECT_REPONAME $tag"
            $releaseBody = "Auto release generated from push.`n`nVersion: $version`nSHA256: $sha256"

            cmd /c "\"$($ghCmd.Source)\" repo view $githubRepo --json name --jq .name 1>nul 2>nul"
            if ($LASTEXITCODE -ne 0) {
              throw "Cannot access repository '$githubRepo' with current GITHUB_TOKEN."
            }

            cmd /c "\"$($ghCmd.Source)\" release view $tag --repo $githubRepo 1>nul 2>nul"
            if ($LASTEXITCODE -ne 0) {
              & $ghCmd.Source release create $tag "dist/$zipName" "dist/manifest.json" "dist/manifest-cos.json" --title $releaseName --notes $releaseBody --repo $githubRepo
            } else {
              & $ghCmd.Source release upload $tag "dist/$zipName" "dist/manifest.json" "dist/manifest-cos.json" --clobber --repo $githubRepo
            }

            python -m pip install --upgrade pip
            python -m pip install coscmd

            coscmd config -a "$env:COS_SECRET_ID" -s "$env:COS_SECRET_KEY" -b "$env:COS_BUCKET" -r "$env:COS_REGION"
            coscmd upload -f "dist/$zipName" "/$cosReleasePrefix/$tag/$zipName"
            coscmd upload -f "dist/manifest-cos.json" "/$cosReleasePrefix/$tag/manifest.json"
            coscmd upload -f "dist/manifest-cos.json" "/$cosManifestKey"

            "VERSION=$version" | Out-File -FilePath dist/build.env -Encoding ascii
            "RELEASE_TAG=$tag" | Out-File -FilePath dist/build.env -Append -Encoding ascii
            "ZIP_NAME=$zipName" | Out-File -FilePath dist/build.env -Append -Encoding ascii
            "SHA256=$sha256" | Out-File -FilePath dist/build.env -Append -Encoding ascii

      - store_artifacts:
          path: dist
          destination: dist

workflows:
  auto-release:
    jobs:
      - build-and-release