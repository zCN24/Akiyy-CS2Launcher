name: Auto Release

on:
  push:
    branches:
      - "**"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    env:
      UPDATE_CHANNEL: stable
      COS_RELEASE_PREFIX: cs2launcher/releases
      COS_MANIFEST_KEY: cs2launcher/latest.json
      COS_SECRET_ID: ${{ secrets.COS_SECRET_ID }}
      COS_SECRET_KEY: ${{ secrets.COS_SECRET_KEY }}
      COS_BUCKET: ${{ secrets.COS_BUCKET }}
      COS_REGION: ${{ secrets.COS_REGION }}
      COS_BASE_URL: ${{ secrets.COS_BASE_URL }}
      SOURCE_MANIFEST_URL: ${{ secrets.SOURCE_MANIFEST_URL }}
      RELEASE_NOTES: ${{ vars.RELEASE_NOTES }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Validate COS secrets
        shell: pwsh
        run: |
          $required = @("COS_SECRET_ID", "COS_SECRET_KEY", "COS_BUCKET", "COS_REGION")
          $missing = @()
          foreach ($name in $required) {
            if ([string]::IsNullOrWhiteSpace((Get-Item "Env:$name").Value)) {
              $missing += $name
            }
          }

          if ($missing.Count -gt 0) {
            throw "Missing required COS secrets: $($missing -join ', ')"
          }

      - name: Compute release metadata
        id: meta
        shell: pwsh
        run: |
          $version = "1.0.${{ github.run_number }}"
          $tag = "v$version"
          $zipName = "CS2Launcher-$version.zip"
          $msiName = "CS2Launcher-$version-win-x64-with-runtime.msi"

          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "zip_name=$zipName" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "msi_name=$msiName" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Build release binaries
        shell: pwsh
        run: |
          dotnet restore CS2Launcher.csproj
          dotnet build CS2Launcher.csproj -c Release /p:Version=${{ steps.meta.outputs.version }} /p:AssemblyVersion=${{ steps.meta.outputs.version }} /p:FileVersion=${{ steps.meta.outputs.version }}

      - name: Build MSI (with runtime)
        shell: pwsh
        run: |
          cmd /c "build-msi.bat ${{ steps.meta.outputs.version }}"
          if ($LASTEXITCODE -ne 0) {
            throw "build-msi.bat failed with exit code $LASTEXITCODE"
          }

      - name: Stage package files
        shell: pwsh
        run: |
          $sourceDir = "artifacts/publish/app"
          $srcDir = "src"
          $stageDir = "dist/stage"

          if (Test-Path "dist") {
            Remove-Item "dist" -Recurse -Force
          }

          New-Item -ItemType Directory -Path $stageDir -Force | Out-Null
          Copy-Item "$sourceDir/*" -Destination $stageDir -Recurse -Force
          Copy-Item "artifacts/installer/${{ steps.meta.outputs.msi_name }}" -Destination "dist/${{ steps.meta.outputs.msi_name }}" -Force

          # Put all files from src into the package root.
          if (Test-Path $srcDir) {
            Copy-Item "$srcDir/*" -Destination $stageDir -Recurse -Force
          }

          Compress-Archive -Path "$stageDir/*" -DestinationPath "dist/${{ steps.meta.outputs.zip_name }}" -Force

      - name: Generate manifests
        id: manifest
        shell: pwsh
        run: |
          $tag = "${{ steps.meta.outputs.tag }}"
          $zipName = "${{ steps.meta.outputs.zip_name }}"
          $version = "${{ steps.meta.outputs.version }}"
          $channel = if ([string]::IsNullOrWhiteSpace($env:UPDATE_CHANNEL)) { "stable" } else { $env:UPDATE_CHANNEL }
          $sha256 = (Get-FileHash -Algorithm SHA256 "dist/$zipName").Hash.ToLowerInvariant()

          $githubPackageUrl = "https://github.com/${{ github.repository }}/releases/download/$tag/$zipName"

          $cosBaseUrl = if ([string]::IsNullOrWhiteSpace($env:COS_BASE_URL)) {
            "https://$($env:COS_BUCKET).cos.$($env:COS_REGION).myqcloud.com"
          } else {
            $env:COS_BASE_URL.TrimEnd('/')
          }

          $cosReleasePrefix = $env:COS_RELEASE_PREFIX.Trim('/')
          $cosManifestKey = $env:COS_MANIFEST_KEY.Trim('/')
          $cosObjectKey = "$cosReleasePrefix/$tag/$zipName"
          $cosPackageUrl = "$cosBaseUrl/$cosObjectKey"

          $mandatory = $false
          $releaseNotes = "Auto release from ${{ github.sha }}"

          if (-not [string]::IsNullOrWhiteSpace($env:SOURCE_MANIFEST_URL)) {
            try {
              $existing = Invoke-RestMethod -Uri $env:SOURCE_MANIFEST_URL -Method Get -TimeoutSec 20
              if ($null -ne $existing.channels) {
                $existingChannel = $existing.channels.$channel
                if ($null -ne $existingChannel) {
                  if ($null -ne $existingChannel.mandatory) {
                    $mandatory = [bool]$existingChannel.mandatory
                  }

                  if (-not [string]::IsNullOrWhiteSpace($existingChannel.releaseNotes)) {
                    $releaseNotes = [string]$existingChannel.releaseNotes
                  }
                }
              } else {
                if ($null -ne $existing.mandatory) {
                  $mandatory = [bool]$existing.mandatory
                }

                if (-not [string]::IsNullOrWhiteSpace($existing.releaseNotes)) {
                  $releaseNotes = [string]$existing.releaseNotes
                }
              }
            } catch {
              Write-Host "Cannot read SOURCE_MANIFEST_URL, fallback to defaults."
            }
          }

          if (-not [string]::IsNullOrWhiteSpace($env:RELEASE_NOTES)) {
            $releaseNotes = $env:RELEASE_NOTES
          }

          $manifestForGithub = [ordered]@{
            version = $version
            packageUrl = $githubPackageUrl
            sha256 = $sha256
            releaseNotes = $releaseNotes
            mandatory = $mandatory
            channel = $channel
          }

          $manifestForCos = [ordered]@{
            version = $version
            packageUrl = $cosPackageUrl
            sha256 = $sha256
            releaseNotes = $releaseNotes
            mandatory = $mandatory
            channel = $channel
          }

          $manifestForGithub | ConvertTo-Json -Depth 6 | Out-File -FilePath "dist/manifest.json" -Encoding utf8
          $manifestForCos | ConvertTo-Json -Depth 6 | Out-File -FilePath "dist/manifest-cos.json" -Encoding utf8

          "sha256=$sha256" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "cos_object_key=$cosObjectKey" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "cos_manifest_key=$cosManifestKey" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ github.event.repository.name }} ${{ steps.meta.outputs.tag }}
          generate_release_notes: true
          make_latest: true
          files: |
            dist/${{ steps.meta.outputs.zip_name }}
            dist/${{ steps.meta.outputs.msi_name }}
            dist/manifest.json
            dist/manifest-cos.json
          body: |
            Auto release generated from push.

            Version: ${{ steps.meta.outputs.version }}
            SHA256: ${{ steps.manifest.outputs.sha256 }}

            GitHub latest manifest URL:
            https://github.com/${{ github.repository }}/releases/latest/download/manifest.json

      - name: Install coscmd
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install coscmd

      - name: Upload release files to COS
        shell: pwsh
        run: |
          $tag = "${{ steps.meta.outputs.tag }}"
          $zipName = "${{ steps.meta.outputs.zip_name }}"
          $msiName = "${{ steps.meta.outputs.msi_name }}"

          $cosReleasePrefix = $env:COS_RELEASE_PREFIX.Trim('/')
          $cosManifestKey = "${{ steps.manifest.outputs.cos_manifest_key }}"

          coscmd config -a "$env:COS_SECRET_ID" -s "$env:COS_SECRET_KEY" -b "$env:COS_BUCKET" -r "$env:COS_REGION"

          # Versioned package and manifest.
          coscmd upload -f "dist/$zipName" "/$cosReleasePrefix/$tag/$zipName"
          coscmd upload -f "dist/$msiName" "/$cosReleasePrefix/$tag/$msiName"
          coscmd upload -f "dist/manifest-cos.json" "/$cosReleasePrefix/$tag/manifest.json"

          # Stable latest manifest for clients.
          coscmd upload -f "dist/manifest-cos.json" "/$cosManifestKey"
