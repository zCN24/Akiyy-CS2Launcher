stages:
  - release

variables:
  DOTNET_CLI_TELEMETRY_OPTOUT: "1"
  DOTNET_NOLOGO: "1"
  UPDATE_CHANNEL: "stable"
  COS_RELEASE_PREFIX: "cs2launcher/releases"
  COS_MANIFEST_KEY: "cs2launcher/latest.json"
  GIT_STRATEGY: fetch

build_and_release:
  stage: release
  # You need a Windows runner because this project builds WPF (net8.0-windows).
  tags:
    - windows
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'
  script:
    - |
      $ErrorActionPreference = "Stop"

      $required = @("COS_SECRET_ID", "COS_SECRET_KEY", "COS_BUCKET", "COS_REGION")
      $missing = @()
      foreach ($name in $required) {
        if ([string]::IsNullOrWhiteSpace((Get-Item "Env:$name" -ErrorAction SilentlyContinue).Value)) {
          $missing += $name
        }
      }
      if ($missing.Count -gt 0) {
        throw "Missing required CI/CD variables: $($missing -join ', ')"
      }

      $version = "1.0.$env:CI_PIPELINE_IID"
      $tag = "v$version"
      $zipName = "CS2Launcher-$version.zip"

      dotnet --info
      dotnet restore CS2Launcher.csproj
      dotnet build CS2Launcher.csproj -c Release /p:Version=$version /p:AssemblyVersion=$version /p:FileVersion=$version

      $sourceDir = "bin/Release/net8.0-windows"
      $srcDir = "src"
      $stageDir = "dist/stage"

      if (Test-Path "dist") {
        Remove-Item "dist" -Recurse -Force
      }

      New-Item -ItemType Directory -Path $stageDir -Force | Out-Null
      Copy-Item "$sourceDir/*" -Destination $stageDir -Recurse -Force

      if (Test-Path $srcDir) {
        Copy-Item "$srcDir/*" -Destination $stageDir -Recurse -Force
      }

      Compress-Archive -Path "$stageDir/*" -DestinationPath "dist/$zipName" -Force

      $channel = if ([string]::IsNullOrWhiteSpace($env:UPDATE_CHANNEL)) { "stable" } else { $env:UPDATE_CHANNEL }
      $sha256 = (Get-FileHash -Algorithm SHA256 "dist/$zipName").Hash.ToLowerInvariant()

      $pkgBase = "$env:CI_API_V4_URL/projects/$env:CI_PROJECT_ID/packages/generic/cs2launcher/$tag"
      $gitlabPackageUrl = "$pkgBase/$zipName"

      $cosBaseUrl = if ([string]::IsNullOrWhiteSpace($env:COS_BASE_URL)) {
        "https://$($env:COS_BUCKET).cos.$($env:COS_REGION).myqcloud.com"
      } else {
        $env:COS_BASE_URL.TrimEnd('/')
      }

      $cosReleasePrefix = $env:COS_RELEASE_PREFIX.Trim('/')
      $cosManifestKey = $env:COS_MANIFEST_KEY.Trim('/')
      $cosObjectKey = "$cosReleasePrefix/$tag/$zipName"
      $cosPackageUrl = "$cosBaseUrl/$cosObjectKey"

      $mandatory = $false
      $releaseNotes = "Auto release from $env:CI_COMMIT_SHA"

      if (-not [string]::IsNullOrWhiteSpace($env:SOURCE_MANIFEST_URL)) {
        try {
          $existing = Invoke-RestMethod -Uri $env:SOURCE_MANIFEST_URL -Method Get -TimeoutSec 20
          if ($null -ne $existing.channels) {
            $existingChannel = $existing.channels.$channel
            if ($null -ne $existingChannel) {
              if ($null -ne $existingChannel.mandatory) {
                $mandatory = [bool]$existingChannel.mandatory
              }
              if (-not [string]::IsNullOrWhiteSpace($existingChannel.releaseNotes)) {
                $releaseNotes = [string]$existingChannel.releaseNotes
              }
            }
          } else {
            if ($null -ne $existing.mandatory) {
              $mandatory = [bool]$existing.mandatory
            }
            if (-not [string]::IsNullOrWhiteSpace($existing.releaseNotes)) {
              $releaseNotes = [string]$existing.releaseNotes
            }
          }
        } catch {
          Write-Host "Cannot read SOURCE_MANIFEST_URL, fallback to defaults."
        }
      }

      if (-not [string]::IsNullOrWhiteSpace($env:RELEASE_NOTES)) {
        $releaseNotes = $env:RELEASE_NOTES
      }

      $manifestForGitLab = [ordered]@{
        version = $version
        packageUrl = $gitlabPackageUrl
        sha256 = $sha256
        releaseNotes = $releaseNotes
        mandatory = $mandatory
        channel = $channel
      }

      $manifestForCos = [ordered]@{
        version = $version
        packageUrl = $cosPackageUrl
        sha256 = $sha256
        releaseNotes = $releaseNotes
        mandatory = $mandatory
        channel = $channel
      }

      $manifestForGitLab | ConvertTo-Json -Depth 6 | Out-File -FilePath "dist/manifest.json" -Encoding utf8
      $manifestForCos | ConvertTo-Json -Depth 6 | Out-File -FilePath "dist/manifest-cos.json" -Encoding utf8

      $pkgHeaders = @{ "JOB-TOKEN" = "$env:CI_JOB_TOKEN" }
      Invoke-RestMethod -Method Put -Headers $pkgHeaders -InFile "dist/$zipName" -ContentType "application/octet-stream" -Uri "$pkgBase/$zipName"
      Invoke-RestMethod -Method Put -Headers $pkgHeaders -InFile "dist/manifest.json" -ContentType "application/json" -Uri "$pkgBase/manifest.json"
      Invoke-RestMethod -Method Put -Headers $pkgHeaders -InFile "dist/manifest-cos.json" -ContentType "application/json" -Uri "$pkgBase/manifest-cos.json"

      if (-not [string]::IsNullOrWhiteSpace($env:GITLAB_API_TOKEN)) {
        $releaseBody = [ordered]@{
          name = "$env:CI_PROJECT_NAME $tag"
          tag_name = $tag
          ref = $env:CI_COMMIT_SHA
          description = "Auto release generated from push.`n`nVersion: $version`nSHA256: $sha256"
        }

        $apiHeaders = @{ "PRIVATE-TOKEN" = "$env:GITLAB_API_TOKEN" }
        Invoke-RestMethod -Method Post -Headers $apiHeaders -ContentType "application/json" -Body ($releaseBody | ConvertTo-Json -Depth 6) -Uri "$env:CI_API_V4_URL/projects/$env:CI_PROJECT_ID/releases"
      } else {
        Write-Host "GITLAB_API_TOKEN is empty, skip GitLab Release creation."
      }

      python -m pip install --upgrade pip
      python -m pip install coscmd

      coscmd config -a "$env:COS_SECRET_ID" -s "$env:COS_SECRET_KEY" -b "$env:COS_BUCKET" -r "$env:COS_REGION"
      coscmd upload -f "dist/$zipName" "/$cosReleasePrefix/$tag/$zipName"
      coscmd upload -f "dist/manifest-cos.json" "/$cosReleasePrefix/$tag/manifest.json"
      coscmd upload -f "dist/manifest-cos.json" "/$cosManifestKey"

      "VERSION=$version" | Out-File -FilePath build.env -Encoding ascii
      "RELEASE_TAG=$tag" | Out-File -FilePath build.env -Append -Encoding ascii
      "ZIP_NAME=$zipName" | Out-File -FilePath build.env -Append -Encoding ascii
      "SHA256=$sha256" | Out-File -FilePath build.env -Append -Encoding ascii

  artifacts:
    when: always
    expire_in: 30 days
    reports:
      dotenv: build.env
    paths:
      - dist/